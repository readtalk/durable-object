<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<title>READTalk</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" href="css/normalize.css" />
		<link rel="stylesheet" href="css/skeleton.css" />
		<link rel="stylesheet" href="styles.css" />

		<link rel="icon" type="image/ico" href="favicon.ico" />
		<script src="/dist/index.js" type="module"></script>
	</head>

	<body>
		<!-- Container dengan fixed positioning ala Edge -->
		<div class="container" style="position:fixed; top:0; left:0; width:100%; height:100%;">
			<div class="row" style="position:relative; width:100%; height:100%;">
				
				<!-- Sidebar - fixed di kiri -->
				<div class="one-third column" style="position:fixed; top:0; left:0; width:30%; height:100%; overflow-y:auto; padding:20px;">
					<h4><b>READ</b>Talk</h4>
				    <button id="themeToggle" class="button" style="margin-top:20px">
						🌙 Dark
					</button>
				</div>

				<!-- Chatlog - fixed di kanan -->
				<div class="two-thirds column" id="root" style="position:fixed; top:0; right:0; width:70%; height:100%; overflow-y:auto;"></div>
			</div>
		</div>

		<!-- Mobile navigation via class -->
		<style>
			@media (max-width: 549px) {
				.one-third.column {
					width: 100% !important;
					display: block;
				}
				.two-thirds.column {
					width: 100% !important;
					display: none;
				}
				body.show-chat .two-thirds.column {
					display: block;
				}
				body.show-chat .one-third.column {
					display: none;
				}
			}
		</style>

		<script>	
			// Theme toggle
			const root = document.documentElement
			const savedTheme = localStorage.getItem("theme") || "light"
			root.dataset.theme = savedTheme

			const btn = document.getElementById("themeToggle")
			if (btn) {
				btn.textContent = savedTheme === "dark" ? "☀️ Light" : "🌙 Dark"
				btn.onclick = () => {
					const next = root.dataset.theme === "dark" ? "light" : "dark"
					root.dataset.theme = next
					localStorage.setItem("theme", next)
					btn.textContent = next === "dark" ? "☀️ Light" : "🌙 Dark"
				}
			}
			
			// Mobile navigation
			document.querySelector('.one-third.column')?.addEventListener('click', (e) => {
				if (!e.target.closest('button')) {
					document.body.classList.add('show-chat');
				}
			});
			
			window.closeChat = () => {
				document.body.classList.remove('show-chat');
			};
		</script>
	</body>
</html>
