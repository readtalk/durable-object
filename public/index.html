<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>READTalk</title>
        <meta name="description" content="" />
        <meta name="author" content="" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link rel="stylesheet" href="css/normalize.css" />
        <link rel="stylesheet" href="css/skeleton.css" />

        <link rel="icon" type="image/ico" href="favicon.ico" />
        <script src="/dist/index.js" type="module"></script>

        <style>
            /* CSS yang kamu minta ditambahkan inline */
            html {
                height: 100%;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
            }

            .chat {
                padding-top: 40px;
            }

            #root {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                overflow-y: auto;
                height: 100%;
                /* padding: 10px; */ /* dikomen seperti aslinya */
            }

            .message {
                margin-bottom: 10px;
            }

            .message .user {
                font-weight: bold;
                text-align: right;
            }

            .message .remove {
                position: absolute;
                width: 22px;
                height: 20px;
                left: -60px;
                display: none;
                padding: 0;
                line-height: 18px;
                border: none;
            }

            .send-message {
                padding: 0;
            }

            .my-input-text::placeholder {
                color: #ccc;
            }

            /* Tambahan kecil biar tidak bentrok terlalu parah dengan skeleton */
            .container {
                width: 100%;
                max-width: 100%;
                height: 100%;
            }

            .row {
                margin: 0;
            }

            /* Biar input form tidak terpengaruh grid skeleton */
            form.row {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
            }

            input.ten.columns.my-input-text {
                flex: 1;
                min-width: 0;
            }
        </style>
    </head>
    <body>
        <div class="container" style="width: 95%; height: 100%">
            <div class="row" style="height: 100%">
                <div class="one-third column" style="margin-top: 25%">
                    <h4><b>READT</b>alk</h4>
                    <p>
                        Status: Online/Offline
                    </p>
                </div>
                <div class="two-thirds column" id="root"></div>
            </div>
        </div>
    </body>
</html>
