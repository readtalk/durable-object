<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>READTalk</title>
    <script src="/dist/index.js" type="module"></script>
    <style>
        /* ===== RESET (gantinya normalize) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            background: #f0f2f5;
        }

        /* ===== GRID (gantinya skeleton) ===== */
        .container {
            width: 95%;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .row {
            display: flex;
            width: 100%;
            height: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .one-third.column {
            width: 30%;
            background: #f8f9fa;
            border-right: 1px solid #e9edef;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .two-thirds.column {
            width: 70%;
            background: #efeae2;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== TYPOGRAPHY ===== */
        h4 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #00a884;
        }

        h4 b {
            font-weight: 700;
        }

        /* ===== CHAT AREA (dari JS akan masuk ke sini) ===== */
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #efeae2;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1" fill="%23d1d7db"/><circle cx="90" cy="30" r="1" fill="%23d1d7db"/><circle cx="30" cy="80" r="1" fill="%23d1d7db"/><circle cx="70" cy="20" r="1" fill="%23d1d7db"/><circle cx="50" cy="50" r="1" fill="%23d1d7db"/></svg>');
            background-repeat: repeat;
        }

        /* Styling untuk chat messages (dari JS) */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s;
        }

        .message .user {
            font-size: 12px;
            font-weight: 600;
            color: #00a884;
            margin-bottom: 2px;
            margin-left: 8px;
        }

        .message .content {
            padding: 8px 12px;
            background: white;
            border-radius: 12px 12px 12px 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .message.me {
            align-self: flex-end;
        }

        .message.me .user {
            text-align: right;
            margin-right: 8px;
        }

        .message.me .content {
            background: #d9fdd3;
            border-radius: 12px 12px 4px 12px;
        }

        /* Input area (dari JS) */
        .send-message {
            flex-shrink: 0;
            display: flex;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e9edef;
            gap: 12px;
        }

        .my-input-text {
            flex: 1;
            height: 45px;
            padding: 0 18px;
            border: 1px solid #e9edef;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }

        .my-input-text:focus {
            border-color: #00a884;
        }

        .send-message button {
            width: 80px;
            height: 45px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-message button:hover {
            background: #008f6b;
        }

        /* ===== MOBILE NAVIGATION ===== */
        @media (max-width: 549px) {
            .container {
                width: 100%;
                height: 100%;
            }
            
            .row {
                height: 100%;
                border-radius: 0;
            }
            
            .one-third.column {
                width: 100%;
                display: block;
            }
            
            .two-thirds.column {
                width: 100%;
                display: none;
            }
            
            body.show-chat .two-thirds.column {
                display: flex;
            }
            
            body.show-chat .one-third.column {
                display: none;
            }
            
            .message {
                max-width: 85%;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DARK MODE ===== */
        [data-theme="dark"] {
            background: #0b141a;
        }

        [data-theme="dark"] .row {
            background: #1f2c34;
        }

        [data-theme="dark"] .one-third.column {
            background: #111b21;
            border-right-color: #2a3942;
            color: #e9edef;
        }

        [data-theme="dark"] .two-thirds.column,
        [data-theme="dark"] #root {
            background: #0b141a;
        }

        [data-theme="dark"] .message .content {
            background: #202c33;
            color: #e9edef;
        }

        [data-theme="dark"] .message.me .content {
            background: #005e54;
            color: white;
        }

        [data-theme="dark"] .send-message {
            background: #1f2c34;
            border-top-color: #2a3942;
        }

        [data-theme="dark"] .my-input-text {
            background: #202c33;
            border-color: #2a3942;
            color: #e9edef;
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="row">
            <div class="one-third column">
                <h4><b>READT</b>alk</h4>
                <p></p>
            </div>
            <div class="two-thirds column" id="root"></div>
        </div>
    </div>

    <script>
        // Theme toggle (opsional)
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        root.dataset.theme = savedTheme;

        // Mobile navigation
        document.querySelector('.one-third.column')?.addEventListener('click', (e) => {
            if (!e.target.closest('button') && window.innerWidth <= 549) {
                document.body.classList.add('show-chat');
            }
        });

        window.closeChat = () => {
            document.body.classList.remove('show-chat');
        };
    </script>
</body>
</html>
