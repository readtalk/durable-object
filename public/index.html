<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>READTalk</title>

  <link rel="icon" type="image/ico" href="favicon.ico" />
  <script src="/dist/index.js" type="module" defer></script>

  <style>
    /* ─── HARD RESET Skeleton / Milligram / Normalize remnants ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Reset grid Skeleton/Milligram sepenuhnya */
    .container,
    .row,
    .one-third, .two-thirds, .one, .two, .three, .four, .five, .six,
    .seven, .eight, .nine, .ten, .eleven, .twelve,
    .column, .columns {
      margin: 0 !important;
      padding: 0 !important;
      width: auto !important;
      max-width: none !important;
      float: none !important;
      display: block !important;
      clear: both !important;
      position: static !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* Force #root full screen */
    #root {
      height: 100dvh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* Chat wrapper yang React render (.chat.container) jadi full flex column */
    .chat.container {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    /* Messages wrapper (semua .row.message) jadi scroll area */
    .chat.container > *:not(form) {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1rem 0.875rem 6.5rem; /* bottom buat input fixed */
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
      scroll-behavior: smooth;
    }

    .row.message {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .row.message .user {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 0.375rem;
      padding-left: 0.875rem;
    }

    .row.message .ten.columns {
      align-self: flex-start;
      max-width: 82%;
      width: fit-content;
      padding: 0.75rem 1rem;
      border-radius: 1.25rem;
      font-size: 1rem;
      line-height: 1.42;
      background: #f3f4f6;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      border-top-left-radius: 0.375rem;
      border-bottom-left-radius: 1.25rem;
      border-top-right-radius: 1.25rem;
      border-bottom-right-radius: 1.25rem;
    }

    .row.message .ten.columns::after {
      content: "baru saja";
      display: block;
      font-size: 0.6875rem;
      color: inherit;
      opacity: 0.7;
      margin-top: 0.375rem;
      text-align: right;
    }

    /* Input form override jadi fixed bottom modern */
    .chat.container > form.row {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.04);
    }

    .chat.container form input.ten.columns.my-input-text {
      flex: 1 1 auto;
      height: 3.125rem;
      padding: 0 1.25rem;
      font-size: 1rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 9999px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat.container form input:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .chat.container form input::placeholder {
      color: #9ca3af;
    }

    .chat.container form button.send-message.two.columns {
      width: 3.125rem;
      height: 3.125rem;
      border: none;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      font-size: 1.25rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat.container form button:hover,
    .chat.container form button:focus {
      background: #dc2626;
    }

    /* Scrollbar clean */
    .chat.container > *:not(form)::-webkit-scrollbar {
      width: 5px;
    }

    .chat.container > *:not(form)::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 5px;
    }

    /* Desktop centering & border */
    @media (min-width: 640px) {
      #root {
        align-items: center;
      }
      .chat.container {
        max-width: 960px;
        border-left: 1px solid #e5e7eb;
        border-right: 1px solid #e5e7eb;
        box-shadow: 0 0 20px rgba(0,0,0,0.03);
      }
      .chat.container > *:not(form) {
        padding: 1.5rem 2rem 7rem;
      }
      form.row {
        max-width: 960px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
