        /* ===== 9. CHAT COMPONENTS (400 baris) ===== */
        .container { width:95%; height:100%; margin:0 auto; display:flex; align-items:center; }
        .row { display:flex; width:100%; height:90%; background:white; border-radius:20px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
        .one-third.column { width:30%; background:#f8f9fa; border-right:1px solid #e9edef; padding:30px 20px; }
        .one-third.column h4 { color:#00a884; font-size:1.5rem; margin-bottom:20px; font-weight:600; }
        .two-thirds.column { width:70%; background:#efeae2; display:flex; flex-direction:column; height:100%; }
        #root { flex:1; display:flex; flex-direction:column; height:100%; overflow:hidden; background:#efeae2; background-image:url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1" fill="%23d1d7db"/><circle cx="90" cy="30" r="1" fill="%23d1d7db"/><circle cx="30" cy="80" r="1" fill="%23d1d7db"/><circle cx="70" cy="20" r="1" fill="%23d1d7db"/><circle cx="50" cy="50" r="1" fill="%23d1d7db"/></svg>'); background-repeat:repeat; }
        .chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; min-height:0; scroll-behavior:smooth; }
        .chat:empty::before { content:"No messages yet"; color:#8696a0; text-align:center; padding:40px; font-style:italic; display:block; }
        .message { max-width:65%; display:flex; flex-direction:column; animation:messageSlide 0.2s ease; }
        .message .user { font-size:12px; font-weight:600; color:#00a884; margin-bottom:2px; margin-left:8px; }
        .message .content { padding:8px 12px; background:white; border-radius:12px 12px 12px 4px; box-shadow:0 1px 2px rgba(0,0,0,0.1); font-size:14px; word-wrap:break-word; line-height:1.4; }
        .message .time { font-size:10px; color:#8696a0; margin-top:2px; margin-left:8px; }
        .message.me { align-self:flex-end; }
        .message.me .user { text-align:right; margin-right:8px; }
        .message.me .content { background:#d9fdd3; border-radius:12px 12px 4px 12px; }
        .message.me .time { text-align:right; margin-right:8px; }
        .message.system { max-width:100%; text-align:center; }
        .message.system .content { background:transparent; color:#8696a0; font-size:12px; box-shadow:none; }
        .send-message { flex-shrink:0; display:flex; padding:12px 15px; background:white; border-top:1px solid #e9edef; gap:10px; align-items:center; }
        .my-input-text { flex:1; height:38px; padding:0 12px; border:1px solid #e9edef; border-radius:24px; font-size:14px; outline:none; transition:border-color 0.2s; }
        .my-input-text:focus { border-color:#00a884; }
        .my-input-text::placeholder { color:#8696a0; }
        .send-message button { height:38px; width:70px; background:#00a884; color:white; border:none; border-radius:24px; font-weight:600; font-size:13px; cursor:pointer; transition:background 0.2s; }
        .send-message button:hover { background:#008f6b; }
        .send-message button:active { transform:scale(0.98); }
        .send-message button:disabled { opacity:0.5; cursor:not-allowed; }

        /* ===== 10. ROSTER (150 baris) ===== */
        #roster { position:fixed; right:20px; top:80px; width:220px; background:white; border-radius:12px; padding:15px; box-shadow:0 5px 20px rgba(0,0,0,0.15); z-index:100; max-height:calc(100vh - 100px); overflow-y:auto; }
        #roster h3 { font-size:14px; color:#667781; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
        #roster p { padding:8px 12px; margin:0 0 4px 0; background:#f8f9fa; border-radius:6px; font-size:14px; color:#111b21; display:flex; align-items:center; gap:8px; }
        #roster p::before { content:""; width:8px; height:8px; background:#00a884; border-radius:50%; display:inline-block; }

        /* ===== 11. SCROLLBAR (50 baris) ===== */
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#c0c0c0; border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:#a0a0a0; }
        * { scrollbar-width:thin; scrollbar-color:#c0c0c0 transparent; }

        /* ===== 12. ANIMATIONS (100 baris) ===== */
        @keyframes messageSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes slideInLeft { from { transform:translateX(-100%); } to { transform:translateX(0); } }
        @keyframes slideInRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
        @keyframes slideInUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
        @keyframes slideInDown { from { transform:translateY(-100%); } to { transform:translateY(0); } }
        @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        @keyframes typing { 0% { opacity:0.3; transform:translateY(0); } 50% { opacity:1; transform:translateY(-3px); } 100% { opacity:0.3; transform:translateY(0); } }
        .animate-slide { animation:messageSlide 0.2s ease; }
        .animate-fade { animation:fadeIn 0.3s ease; }
        .animate-bounce { animation:bounce 1s infinite; }
        .animate-pulse { animation:pulse 1.5s infinite; }
        .animate-spin { animation:spin 1s linear infinite; }
        .typing-dots { display:flex; gap:3px; padding:5px; }
        .typing-dots span { width:6px; height:6px; background:#8696a0; border-radius:50%; animation:typing 1s infinite; }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }

        /* ===== 13. DARK MODE (300 baris) ===== */
        [data-theme="dark"] { color-scheme:dark; }
        [data-theme="dark"] body { background:#0b141a; color:#e9edef; }
        [data-theme="dark"] .row { background:#1f2c34; }
        [data-theme="dark"] .one-third.column { background:#111b21; border-right-color:#2a3942; color:#e9edef; }
        [data-theme="dark"] .one-third.column h4 { color:#00a884; }
        [data-theme="dark"] .two-thirds.column { background:#0b141a; }
        [data-theme="dark"] #root { background:#0b141a; }
        [data-theme="dark"] .message .content { background:#202c33; color:#e9edef; }
        [data-theme="dark"] .message .time { color:#8696a0; }
        [data-theme="dark"] .message.me .content { background:#005e54; color:white; }
        [data-theme="dark"] .send-message { background:#1f2c34; border-top-color:#2a3942; }
        [data-theme="dark"] .my-input-text { background:#202c33; border-color:#2a3942; color:#e9edef; }
        [data-theme="dark"] .my-input-text::placeholder { color:#8696a0; }
        [data-theme="dark"] #roster { background:#202c33; border-color:#2a3942; }
        [data-theme="dark"] #roster p { background:#2a3942; color:#e9edef; }
        [data-theme="dark"] .border { border-color:#2a3942; }
        [data-theme="dark"] .bg-white { background:#1f2c34; }
        [data-theme="dark"] .bg-gray-100 { background:#202c33; }
        [data-theme="dark"] .text-gray-600 { color:#8696a0; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb { background:#3a4a5a; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background:#4a5a6a; }

        /* ===== 14. MOBILE (200 baris) ===== */
        @media (max-width:549px) {
            .container { width:100%; height:100%; padding:0; }
            .row { height:100%; border-radius:0; }
            .one-third.column { width:100%; display:block; }
            .two-thirds.column { width:100%; display:none; }
            body.show-chat .two-thirds.column { display:flex; }
            body.show-chat .one-third.column { display:none; }
            .message { max-width:85%; }
            .chat { padding:15px; }
            .send-message { padding:10px; gap:8px; }
            .my-input-text { height:36px; font-size:13px; }
            .send-message button { height:36px; width:65px; font-size:12px; }
            #roster { width:160px; right:10px; font-size:12px; }
            #roster p { padding:6px 10px; }
            .back-button { display:block; position:absolute; top:10px; left:10px; z-index:20; background:none; border:none; font-size:24px; color:#00a884; cursor:pointer; }
        }
        @media (min-width:550px) { .back-button { display:none; } }
        @media (max-width:380px) {
            .send-message button { width:55px; }
            .my-input-text { padding:0 8px; }
        }

        /* ===== 15. UTILITIES (250 baris) ===== */
        .w-25 { width:25% !important; }

</head>
<body data-theme="light">
    <div class="container">
        <div class="row">
            <div class="one-third column">
                <h4><b>READT</b>alk</h4>
            </div>
            <div class="two-thirds column" id="root"></div>
        </div>
    </div>

    <script>
        (function() {
            // Theme management
            const root = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'light';
            root.dataset.theme = savedTheme;

            // Mobile navigation
            const sidebar = document.querySelector('.one-third.column');
            if (sidebar) {
                sidebar.addEventListener('click', (e) => {
                    if (!e.target.closest('button') && window.innerWidth <= 549) {
                        document.body.classList.add('show-chat');
                    }
                });
            }

            window.closeChat = () => {
                document.body.classList.remove('show-chat');
            };

            // Add back button dynamically
            const chatColumn = document.querySelector('.two-thirds.column');
            if (chatColumn) {
                const backBtn = document.createElement('button');
                backBtn.className = 'back-button';
                backBtn.innerHTML = '←';
                backBtn.onclick = window.closeChat;
                chatColumn.appendChild(backBtn);
            }

            // Theme toggle (optional)
            window.toggleTheme = () => {
                const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
                root.dataset.theme = next;
                localStorage.setItem('theme', next);
            };
        })();
    </script>
</body>
