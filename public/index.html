<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>READTalk</title>
    <script src="/dist/index.js" type="module"></script>
    <style>
        /* ===== RESET ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; width:100%; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height:1.5; background:#f0f2f5; }

        /* ===== VARIABLES ===== */
        :root { 
            --primary:#00a884; 
            --primary-dark:#008f6b; 
            --bg-dark:#0b141a; 
            --text-dark:#e9edef; 
            --border-dark:#2a3942; 
            --bg-light:#ffffff; 
            --text-light:#111b21; 
            --border-light:#e0e0e0; 
        }

        /* ===== LAYOUT UTAMA ===== */
        .container {
            width: 95%;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .row {
            display: flex;
            width: 100%;
            height: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .one-third.column {
            width: 30%;
            background: #f8f9fa;
            border-right: 1px solid #e9edef;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .two-thirds.column {
            width: 70%;
            background: #efeae2;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== TYPOGRAPHY ===== */
        h4 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--primary);
        }
        h4 b { font-weight: 700; }

        /* ===== CHAT AREA ===== */
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1" fill="%23d1d7db"/><circle cx="90" cy="30" r="1" fill="%23d1d7db"/><circle cx="30" cy="80" r="1" fill="%23d1d7db"/><circle cx="70" cy="20" r="1" fill="%23d1d7db"/><circle cx="50" cy="50" r="1" fill="%23d1d7db"/></svg>');
            background-repeat: repeat;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 65%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        .message .user {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
            margin-left: 8px;
        }

        .message .content {
            padding: 6px 10px;
            background: white;
            border-radius: 12px 12px 12px 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.me {
            align-self: flex-end;
        }

        .message.me .user {
            text-align: right;
            margin-right: 8px;
        }

        .message.me .content {
            background: #d9fdd3;
            border-radius: 12px 12px 4px 12px;
        }

        /* ===== INPUT AREA ===== */
        .send-message {
            flex-shrink: 0;
            display: flex;
            padding: 10px 15px;
            background: white;
            border-top: 1px solid #e9edef;
            gap: 10px;
            align-items: center;
        }

        .my-input-text {
            flex: 1;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #e9edef;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .my-input-text:focus {
            border-color: var(--primary);
        }

        .my-input-text::placeholder {
            color: #8696a0;
        }

        .send-message button {
            height: 36px;
            width: 70px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-message button:hover {
            background: var(--primary-dark);
        }

        /* ===== ROSTER (USER LIST) ===== */
        .roster {
            position: absolute;
            right: 20px;
            top: 80px;
            width: 220px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .roster h3 {
            font-size: 14px;
            color: #667781;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .roster-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .roster-item::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== MOBILE NAVIGATION ===== */
        @media (max-width: 549px) {
            .container {
                width: 100%;
                height: 100%;
                padding: 0;
            }
            
            .row {
                height: 100%;
                border-radius: 0;
            }
            
            .one-third.column {
                width: 100%;
                display: block;
            }
            
            .two-thirds.column {
                width: 100%;
                display: none;
            }
            
            body.show-chat .two-thirds.column {
                display: flex;
            }
            
            body.show-chat .one-third.column {
                display: none;
            }
            
            .message {
                max-width: 85%;
            }
            
            .roster {
                width: 180px;
                right: 10px;
            }
        }

        /* ===== DARK MODE ===== */
        [data-theme="dark"] body {
            background: var(--bg-dark);
        }

        [data-theme="dark"] .row {
            background: #1f2c34;
        }

        [data-theme="dark"] .one-third.column {
            background: #111b21;
            border-right-color: var(--border-dark);
            color: var(--text-dark);
        }

        [data-theme="dark"] .two-thirds.column,
        [data-theme="dark"] #root {
            background: var(--bg-dark);
        }

        [data-theme="dark"] .message .content {
            background: #202c33;
            color: var(--text-dark);
        }

        [data-theme="dark"] .message.me .content {
            background: #005e54;
            color: white;
        }

        [data-theme="dark"] .send-message {
            background: #1f2c34;
            border-top-color: var(--border-dark);
        }

        [data-theme="dark"] .my-input-text {
            background: #202c33;
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        [data-theme="dark"] .roster {
            background: #202c33;
        }

        [data-theme="dark"] .roster-item {
            background: #2a3942;
            color: var(--text-dark);
        }

        /* ===== UTILITIES ===== */
        .hidden { display: none; }
        .w-100 { width: 100%; }
        .h-100 { height: 100%; }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="row">
            <!-- KIRI - SIDEBAR -->
            <div class="one-third column">
                <h4><b>READT</b>alk</h4>
                <div class="user-profile">
                    <p>Welcome back!</p>
                </div>
            </div>
            
            <!-- KANAN - CHAT -->
            <div class="two-thirds column" id="root"></div>
        </div>
    </div>

    <script>
        // Theme toggle
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        root.dataset.theme = savedTheme;

        // Mobile navigation
        document.querySelector('.one-third.column')?.addEventListener('click', (e) => {
            if (!e.target.closest('button') && window.innerWidth <= 549) {
                document.body.classList.add('show-chat');
            }
        });

        window.closeChat = () => {
            document.body.classList.remove('show-chat');
        };
    </script>
</body>
</html>
