<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>READTalk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- Pertahankan kalau ada global.css / styles.css, tapi kita override di bawah -->
  <!-- <link rel="stylesheet" href="global.css" /> -->
  <!-- <link rel="stylesheet" href="styles.css" /> -->
  
  <link rel="icon" type="image/ico" href="favicon.ico" />
  
  <script src="/dist/index.js" type="module" defer></script>
  
  <style>
    /* Reset dasar + dark mode global */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body, #root {
      height: 100%;
      background: #0b0e11;
      color: #d1d5db;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Override .container supaya full height & chat layout */
    .chat.container {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: none !important;
      width: 100%;
      padding: 0;
      margin: 0;
    }

    /* Area pesan - scrollable */
    .chat.container > .row.message {
      /* Kita ubah jadi flex bubble style */
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* Tiap pesan jadi bubble */
    .row.message {
      margin: 4px 0 !important;
      padding: 0 !important;
      background: transparent !important;
      border: none !important;
    }

    .row.message .user {
      display: none; /* sembunyikan username di bubble, atau tampilkan kecil */
      /* kalau mau tampilkan: font-size: 0.75rem; opacity: 0.7; margin-bottom: 2px; */
    }

    .row.message .ten.columns {
      max-width: 80%;
      padding: 8px 12px !important;
      border-radius: 7.5px;
      font-size: 0.95rem;
      line-height: 1.35;
      word-wrap: break-word;
      position: relative;
    }

    /* Pesan dari orang lain (received) - kiri */
    .row.message:not(:has(.user:contains("<?php echo $name; ?>"))) .ten.columns {
      align-self: flex-start;
      background: #202c33;
      border-bottom-left-radius: 2px;
      color: #e9edef;
    }

    /* Pesan dari diri sendiri (sent) - kanan + hijau */
    .row.message:has(> .user:contains("<?php echo $name; ?>")) .ten.columns,
    .row.message .user ~ .ten.columns { /* fallback kalau nama di state */
      align-self: flex-end;
      background: #005e54;
      color: white;
      border-bottom-right-radius: 2px;
    }

    /* Tambah timestamp kecil (opsional, kalau mau tambah di JSX nanti) */
    /* .row.message .ten.columns::after { content: "19:42"; display: block; font-size: 0.68rem; opacity: 0.6; text-align: right; margin-top: 2px; } */

    /* Form input di bawah - override jadi modern */
    .chat.container > form.row {
      padding: 8px 12px;
      background: #111b21;
      border-top: 1px solid #202c33;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 !important;
      flex-shrink: 0;
    }

    .chat.container form input.ten.columns.my-input-text {
      flex: 1;
      height: 44px;
      padding: 0 16px !important;
      border: none;
      border-radius: 22px;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.95rem;
      outline: none;
    }

    .chat.container form input::placeholder {
      color: #8696a0;
    }

    .chat.container form button.send-message.two.columns {
      width: 44px !important;
      height: 44px;
      border-radius: 50% !important;
      background: #005e54;
      color: white;
      font-size: 1.1rem;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .chat.container form button:hover {
      background: #006d62;
    }

    /* Scroll area pesan */
    .chat.container {
      overflow: hidden;
    }

    .chat.container > *:not(form) {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    /* Optional: background chat pattern subtle */
    .chat.container > *:not(form) {
      background: #0b0e11 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230b0e11"/><circle cx="10" cy="10" r="1" fill="%23111b21"/><circle cx="30" cy="70" r="1.2" fill="%23111b21"/></svg>') repeat;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
