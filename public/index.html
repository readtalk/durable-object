<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>READTalk</title>
    <script src="/dist/index.js" type="module"></script>
    <style>
        /* ===== RESET ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; width:100%; font-family:system-ui, -apple-system, sans-serif; background:#f0f2f5; }

        /* ===== LAYOUT KING ===== */
        .container {
            width: 95%;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .row {
            display: flex;
            width: 100%;
            height: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* ===== KIRI (SIDEBAR) ===== */
        .one-third.column {
            width: 30%;
            background: #f8f9fa;
            border-right: 1px solid #e9edef;
            padding: 30px 20px;
        }

        .one-third.column h4 {
            color: #00a884;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* ===== KANAN (CHAT) ===== */
        .two-thirds.column {
            width: 70%;
            background: #efeae2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* KING: #root adalah container chat */
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Chat messages container */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        /* Bubble chat */
        .message {
            max-width: 65%;
            display: flex;
            flex-direction: column;
            animation: fade 0.2s;
        }

        .message .user {
            font-size: 12px;
            font-weight: 600;
            color: #00a884;
            margin-bottom: 2px;
            margin-left: 8px;
        }

        .message .content {
            padding: 8px 12px;
            background: white;
            border-radius: 12px 12px 12px 4px;
            font-size: 14px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.me {
            align-self: flex-end;
        }

        .message.me .user {
            text-align: right;
            margin-right: 8px;
        }

        .message.me .content {
            background: #d9fdd3;
            border-radius: 12px 12px 4px 12px;
        }

        /* Input area (dari JS) - DIATUR KING! */
        .send-message {
            flex-shrink: 0;
            display: flex;
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #e9edef;
            gap: 10px;
            align-items: center;
        }

        .my-input-text {
            flex: 1;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #e9edef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .my-input-text:focus {
            border-color: #00a884;
        }

        .send-message button {
            height: 38px;
            width: 70px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .send-message button:hover {
            background: #008f6b;
        }

        /* Tampilan saat kosong */
        .chat:empty::before {
            content: "No messages yet";
            color: #8696a0;
            text-align: center;
            padding: 40px;
            font-style: italic;
            display: block;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }

        /* Mobile */
        @media (max-width: 549px) {
            .container { width:100%; height:100%; padding:0; }
            .row { height:100%; border-radius:0; }
            .one-third.column { width:100%; display:block; }
            .two-thirds.column { width:100%; display:none; }
            body.show-chat .two-thirds.column { display:flex; }
            body.show-chat .one-third.column { display:none; }
            .message { max-width:85%; }
        }

        /* Dark mode */
        [data-theme="dark"] body { background:#0b141a; }
        [data-theme="dark"] .row { background:#1f2c34; }
        [data-theme="dark"] .one-third.column { background:#111b21; border-right-color:#2a3942; color:#e9edef; }
        [data-theme="dark"] .two-thirds.column, [data-theme="dark"] #root { background:#0b141a; }
        [data-theme="dark"] .message .content { background:#202c33; color:#e9edef; }
        [data-theme="dark"] .message.me .content { background:#005e54; color:white; }
        [data-theme="dark"] .send-message { background:#1f2c34; border-top-color:#2a3942; }
        [data-theme="dark"] .my-input-text { background:#202c33; border-color:#2a3942; color:#e9edef; }

        @keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="row">
            <div class="one-third column">
                <h4><b>READT</b>alk</h4>
            </div>
            <div class="two-thirds column" id="root"></div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        root.dataset.theme = savedTheme;

        document.querySelector('.one-third.column')?.addEventListener('click', (e) => {
            if (!e.target.closest('button') && window.innerWidth <= 549) {
                document.body.classList.add('show-chat');
            }
        });
        window.closeChat = () => document.body.classList.remove('show-chat');
    </script>
</body>
</html>
