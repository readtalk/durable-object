<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>READTalk</title>
	<meta name="description" content="Welcome to READTalk" />
	<meta name="author" content="readtalk" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" href="css/normalize.css" />
	<link rel="stylesheet" href="css/skeleton.css" />
	<link rel="stylesheet" href="styles.css" />
	<link rel="icon" type="image/ico" href="favicon.ico" />
	<script src="/dist/index.js" type="module"></script>
	<style>		
		body,
		html {
			height: 100%;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
		}

		#root {
			flex: 1;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			overflow-y: auto;
			height: 100%;
		}

		.chat {
			padding-top: 40px;
		}

		.message {
			margin-bottom: 10px;
		}

		.message .user {
			font-weight: bold;
			text-align: right;
		}

		.message .remove {
			position: absolute;
			width: 22px;
			height: 20px;
			left: -60px;
			display: none;
			padding: 0;
			line-height: 18px;
		}

		.send-message {
			padding: 0;
		}

		.my-input-text::placeholder {
			color: #ccc;
		}

		/* ==================== SMARTPHONE/DESKTOP ==================== */

@media (max-width: 549px) {
  .row {
    display: flex !important;
    flex-direction: column !important;
    flex-wrap: nowrap !important;
  }

  .one-third.column {
    width: 100% !important;
    height: 100vh !important;
    flex: 1 1 100% !important;
    display: flex !important;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    background: #ffffff;
    text-align: center;
    z-index: 20;
    position: relative;
  }

  .one-third.column h4 {
    font-size: 3.5rem;
    margin-bottom: 20px;
    color: #000;
  }

  .one-third.column p {
    font-size: 1.4rem;
    color: #555;
  }

  
  .two-thirds.column {
    display: none !important;
  }

  
  form.row {
    position: fixed !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    z-index: 10 !important;
  }
}
	</style>
</head>
<body>
	<div class="container" style="width: 95%; height: 100%">
		<div class="row" style="height: 100%">
			<div class="one-third column" style="margin-top: 1%">
				<h4><b>READT</b>alk</h4>
				<p>Status: Online/Offline</p>
			</div>
			<div class="two-thirds column" id="root"></div>
		</div>
	</div>
</body>
</html>
